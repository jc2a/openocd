# The BCM5354 integrates a high-performance MIPS32 processor, IEEE 802.11 b/g
# MAC/PHY, 2.4-GHz direct conversion radio, USB 2.0 host controller, SDRAM
# controller, and a configurable five-port Fast Ethernet (FE) switch.
#
# The BCM5354 provides wireless LAN connectivity that supports data rates of
# up to 125 Mbps that is backward-compatible with standard 802.11 b/g.
#
# The BCM5354 supports a WAN connection via its configurable media interfaces.
# The per-port programmable four-level priority queues enable QoS (IEEE
# 802.1p) for guaranteed bandwidth applications. DiffServ/TOS, and L2/L3 IGMP
# snooping. The IEEE 802.1Q VLAN allows flexible implementation of VLAN
# grouping and WAN port segregation.

if { [info exists CHIPNAME] } {
    set _CHIPNAME $CHIPNAME
} else {
    set _CHIPNAME bcm5354
}

if { [info exists CPUTAPID] } {
    set _CPUTAPID $CPUTAPID
} else {
    set _CPUTAPID 0x2535417F
}

jtag newtap $_CHIPNAME cpu -irlen 8 -ircapture 0x1 -irmask 0x1f -expected-id $_CPUTAPID
adapter speed 1000

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME mips_m4k -endian little -chain-position $_TARGETNAME