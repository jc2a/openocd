#
# Chinese FT2232HL Board V3.6
#
# This is for a FT2232HL JTAG adapter sold online by Chinese retailers. The
# adapter itself is not clearly branded. The PCB is marked with the following
# identifiers.
#   - "FT2232HL Board V3.6"
#   - "popctrl#163.com"
#
# Some additional information about this adapter can be found here:
#
#     https://github.com/arm8686/FT2232HL-Board
#

adapter driver ftdi

ftdi vid_pid 0x0403 0x6010
ftdi channel 1

# Enable sampling on falling edge for high JTAG speeds.
ftdi tdo_sample_edge falling

#  D: 1 = OUTPUT, 0 = INPUT
#  S: Initial Data State
#  PIN   MASK S D SIGNAL
# BDBUS0 0001 0 O TCK
# BDBUS1 0002 0 O TDI
# BDBUS2 0004 z I TDO
# BDBUS3 0008 1 O TMS
# BDBUS4 0010 1 O nTRST [GPIOL0] (JTAG TAP Reset)
# BDBUS5 0020 0 O DBGRQ [GPIOL1]
# BDBUS6 0040 1 O nSRST [GPIOL2] (System Reset)
# BDBUS7 0080 z I RTCK
#                <DATA> <DIR>
ftdi layout_init 0x0058 0x007b
ftdi layout_signal nSRST -noe 0x0040
ftdi layout_signal nTRST -ndata 0x0010 -noe 0x0010
ftdi layout_signal RTCK -input 0x0080

transport select jtag